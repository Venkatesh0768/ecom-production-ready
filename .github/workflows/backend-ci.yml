name: Ecom CI/CD

on:
  push:
    branches: [ main ]

jobs:

  backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./ecom-backend
          file: ./ecom-backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecom-backend:latest


  frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: backend   # optional (remove if you want parallel builds)

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./ecom-frontend
          file: ./ecom-frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecom-frontend:latest